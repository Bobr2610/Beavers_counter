<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Счётчик посещений</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #fff;
      font-family: sans-serif;
    }
    .label {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }
    #counter {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-end;
      gap: 2px;
    }
    #counter img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div class="label">посещений</div>
  <div id="counter"></div>
  <script>
    async function loadCounter() {
      try {
        const response = await fetch('counter.json');
        const data = await response.json();
        const count = data.count || 0;
        const digits = count.toString().padStart(7, '0');
        const container = document.getElementById('counter');
        container.innerHTML = '';

        for (const digit of digits) {
          const img = document.createElement('img');
          img.src = `theme/${digit}.png`;
          img.alt = digit;
          container.appendChild(img);
        }
      } catch (e) {
        console.error('Failed to load counter:', e);
      }
    }
    loadCounter();
  </script>
</body>
</html>
