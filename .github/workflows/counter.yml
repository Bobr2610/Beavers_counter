name: Update Counter

on:
  push:
    branches: [main]
    paths-ignore:
      - 'counter.json'
      - 'counter.txt'
      - 'counter.png'
  schedule:
    - cron: '0 * * * *'   # every hour (traffic updates hourly)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch traffic from GitHub API
        id: traffic
        run: |
          REPO="${{ github.repository }}"
          RESP=$(curl -sS -w "\n%{http_code}" -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/traffic/views?per=day") || true
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          if [ "$HTTP" = "200" ] && echo "$BODY" | grep -q '"count"'; then
            n=$(echo "$BODY" | grep -o '"count": *[0-9]*' | head -1 | grep -o '[0-9]*')
          else
            n=$(grep -o '"count": *[0-9]*' counter.json 2>/dev/null | grep -o '[0-9]*' || echo 0)
          fi
          n=${n:-0}
          echo "count=$n" >> $GITHUB_OUTPUT

      - name: Save and generate badge
        run: |
          n=${{ steps.traffic.outputs.count }}
          echo "$n" > counter.txt
          echo "{\"count\": $n}" > counter.json
          sudo apt-get update -qq && sudo apt-get install -y imagemagick
          files=$(printf "%07d" $n | sed 's/\(.\)/theme\/\1.png /g')
          convert $files -resize 80x80 +append counter.png

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.json counter.txt counter.png
          git diff --staged --quiet || git commit -m "views: ${{ steps.traffic.outputs.count }}"
          git push
